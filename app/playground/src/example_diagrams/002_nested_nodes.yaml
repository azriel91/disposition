---
# Nested nodes -- demonstrates thing_hierarchy for grouping.

things:
  t_cloud: "Cloud Platform"
  t_cloud_compute: "Compute"
  t_cloud_compute_vm1: "VM 1"
  t_cloud_compute_vm2: "VM 2"
  t_cloud_storage: "Storage"
  t_cloud_storage_bucket: "Object Bucket"
  t_cloud_storage_disk: "Block Disk"

thing_hierarchy:
  t_cloud:
    t_cloud_compute:
      t_cloud_compute_vm1: {}
      t_cloud_compute_vm2: {}
    t_cloud_storage:
      t_cloud_storage_bucket: {}
      t_cloud_storage_disk: {}

# Override the default flex direction for container things.
#
# By default, direction alternates by depth (column at even, row at odd).
# Here we force the top-level cloud container to lay out its children
# in a row, so Compute and Storage sit side by side.
thing_layouts:
  t_cloud: "row"
  t_cloud_compute: "column"
  t_cloud_storage: "column"
