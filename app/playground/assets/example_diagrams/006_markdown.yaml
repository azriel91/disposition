---
# Markdown Descriptions
#
# `thing_descs` accept **markdown**, and so do `edge_descs`, a process's
# `desc`, and `step_descs`. Supported styles include headings, **bold**,
# *italic*, `inline code`, ~~strikethrough~~, bullet lists, ordered lists,
# blockquotes, fenced code blocks, and
# [links](https://github.com/azriel91/disposition).
#
# Descriptions are laid out alongside their thing, so keep them concise.
things:
  t_repo: {}
  t_ci: {}
thing_names:
  t_repo: Repository
  t_ci: CI Pipeline
thing_dependencies:
  edge_dep_repo_ci:
    kind: sequence
    things:
      - t_repo
      - t_ci
thing_descs:
  t_repo: |-
    ### Source

    The **main** branch is protected.

    > **Note:** force-pushes to `main` are rejected, and pull requests\
    > require a passing CI run before they can be merged.

    Clone with `git clone`, see the
    [README](https://github.com/azriel91/disposition).

    Unordered List:

    * unordered item 1
    * unordered item 2
        - unordered nested item 2.1

    Ordered list:

    1. item 1
    2. item 2

        1. nested ordered item 2.1
        2. nested ordered item 2.2

            1. roman item one
            2. roman item two
            3. roman item three

    3. item 3
    4. item 4
    5. item 5
    6. item 6
    7. item 7
    8. item 8
    9. item 9
    10. item 10

  t_ci: |-
    ### Pipeline

    Runs on every *push*:

    * lint and `cargo fmt`
    * test
    * ~~manual deploy~~ automated deploy

    ```yaml
    string: hello
    number: 1
    list:
      - item 1
      - item 2
    map:
      key1: value1
      key2: value2
    ```

edge_descs:
  edge_dep_repo_ci__0: on **push**

edge_labels:
  edge_dep_repo_ci__0:
    from: |-
      * **repo:** `azriel91/disposition`
      * **branch:** `main`
    to: |-
      github: <https://github.com/azriel91/disposition>
