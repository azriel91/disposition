---
# Edge Labels & Descriptions
#
# Edges can carry two kinds of text:
#
# * `edge_descs`  -- a description rendered in the *middle* of the edge.
# * `edge_labels` -- short labels at each *endpoint* (`from` and `to`).
#
# Both are keyed by the edge *instance* ID: the edge group ID, then `__`, then
# the edge's index. The first (often only) edge of group `edge_dep_client_api`
# is `edge_dep_client_api__0`. A `symmetric` group has two edges, `__0` and
# `__1`. The arrow runs from the first thing in the group to the last, so
# `from` sits at the first thing and `to` at the last.
thing_names:
  t_client: "Client"
  t_api: "API"
  t_db: "Database"

things:
  t_client: {}
  t_api: {}
  t_db: {}

thing_dependencies:
  edge_dep_client_api:
    kind: sequence
    things: [t_client, t_api]
  edge_dep_api_db:
    kind: sequence
    things: [t_api, t_db]

# Description in the middle of each edge.
edge_descs:
  edge_dep_client_api__0: "HTTPS / JSON"
  edge_dep_api_db__0: "SQL"

# Labels at each endpoint of an edge.
edge_labels:
  edge_dep_client_api__0:
    from: "request"
    to: "handle"
  edge_dep_api_db__0:
    from: "query"
    to: "rows"
