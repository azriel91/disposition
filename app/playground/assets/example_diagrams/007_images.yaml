---
# Inline Images
#
# Markdown image syntax embeds pictures inside a description:
#
#     ![alt text {WxH}](url)
#
# The `{WxH}` suffix in the alt text sets the rendered width and height (the
# size is otherwise read from a PNG, or falls back to 100x100). The URL can be
# a normal link or a `data:` URL. Small inline SVGs work well as `data:` URLs,
# so the diagram stays self-contained with no external requests.
thing_names:
  t_browser: "Browser"
  t_server: "Server"
  t_db: "Database"

things:
  t_browser: {}
  t_server: {}
  t_db: {}

thing_descs:
  t_browser: |-
    ![browser {48x48}](data:image/svg+xml;base64,)

    The **client** UI.
  t_server: |-
    ![server {48x48}](data:image/svg+xml;base64,)

    Handles requests.
  t_db: |-
    ![database {48x48}](data:image/svg+xml;base64,)

    Stores **state**.

thing_dependencies:
  edge_dep_browser_server:
    kind: sequence
    things: [t_browser, t_server]
  edge_dep_server_db:
    kind: sequence
    things: [t_server, t_db]
