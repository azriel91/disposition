---
# Rank Directions
#
# `render_options` controls how the whole diagram is laid out.
#
# `rank_dir` sets the direction nodes flow along their edges:
#
# * `top_to_bottom` (the default)
# * `left_to_right`
# * `right_to_left`
# * `bottom_to_top`
#
# `dependency_edge_curvature` and `interaction_edge_curvature` may be
# `orthogonal` (the dependencies default), `curved`, `direct_straight`, or
# `direct_curved` (the interactions default).
#
# This example lays a simple CI pipeline out left to right with curved edges.
# Try changing `rank_dir` to `top_to_bottom` to see the difference.
things:
  t_source: {}
  t_build: {}
  t_test: {}
  t_package: {}
  t_deploy: {}
thing_names:
  t_source: "Source"
  t_build: "Build"
  t_test: "Test"
  t_package: "Package"
  t_deploy: "Deploy"

thing_dependencies:
  edge_dep_source_build:
    kind: sequence
    things: [t_source, t_build]
  edge_dep_build_test:
    kind: sequence
    things: [t_build, t_test]
  edge_dep_test_package:
    kind: sequence
    things: [t_test, t_package]
  edge_dep_package_deploy:
    kind: sequence
    things: [t_package, t_deploy]

render_options:
  rank_dir: left_to_right
  dependency_edge_curvature: curved
