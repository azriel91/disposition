---
# Class Diagram
#
# A worked example combining several features: nested things for class
# members, dependencies for inheritance / composition, types for styling, and
# descriptions and tags for context.
#
# Each class is a container `thing`, and its fields are nested children
# (`t_animal_name` is a child of `t_animal`).
things:
  t_animal: "Animal"
  t_animal_name: "name: String"
  t_animal_age: "age: u32"
  t_dog: "Dog"
  t_dog_breed: "breed: String"
  t_cat: "Cat"
  t_cat_indoor: "indoor: bool"
  t_owner: "Owner"
  t_owner_name: "name: String"
  t_owner_pets: "pets: Vec<Animal>"

thing_hierarchy:
  t_animal:
    t_animal_name: {}
    t_animal_age: {}
  t_dog:
    t_dog_breed: {}
  t_cat:
    t_cat_indoor: {}
  t_owner:
    t_owner_name: {}
    t_owner_pets: {}

thing_dependencies:
  edge_dep_dog_animal:
    kind: sequence
    things:
      - t_animal
      - t_dog
  edge_dep_cat_animal:
    kind: sequence
    things:
      - t_animal
      - t_cat
  edge_dep_owner_animal:
    kind: sequence
    things:
      - t_animal
      - t_owner

thing_descs:
  t_animal: "Abstract base class"
  t_dog: "Concrete subclass"
  t_cat: "Concrete subclass"
  t_owner: "Composition root"

edge_descs:
  edge_dep_dog_animal: "inherits"
  edge_dep_cat_animal: "inherits"
  edge_dep_owner_animal: "has many"

entity_types:
  t_animal: [type_abstract_class]
  t_dog: [type_concrete_class]
  t_cat: [type_concrete_class]
  t_owner: [type_concrete_class]

tags:
  tag_inheritance: "Inheritance"
  tag_composition: "Composition"

tag_things:
  tag_inheritance:
    - t_animal
    - t_dog
    - t_cat
  tag_composition:
    - t_owner
    - t_animal

theme_types_styles:
  type_abstract_class:
    node_defaults:
      style_aliases_applied: [rounded_sm, shade_light]
      stroke_style: "dashed"
      shape_color: "violet"
      stroke_width: "2"
  type_concrete_class:
    node_defaults:
      style_aliases_applied: [rounded_sm, shade_light]
      stroke_style: "solid"
      shape_color: "sky"
      stroke_width: "2"
