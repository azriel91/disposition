  edge_ix_t_localhost__t_github_user_repo__pull__0: "`git pull`"
  edge_ix_t_localhost__t_github_user_repo__push__0: "`git push`"
entity_tooltips:
  proc_app_dev_step_repository_clone: "```bash\ngit clone https://github.com/azriel91/web_app.git\n```"
  proc_app_dev_step_project_build: "Develop the app:\n\n* Always link to issue.\n* Open PR."
  proc_app_release_step_crate_version_update: "```bash\nsd -s 'version = \"0.3.0\"' 'version = \"0.3.0\"' $(fd -tf -F toml) README.md src/lib.rs\n```"
  proc_app_release_step_pull_request_open: Create a pull request as usual.
  proc_app_release_step_gh_actions_build: Github Actions will build the image.
  proc_app_release_step_tag_and_push: "When the PR is merged, tag the commit and push the tag to GitHub.\n\n```bash\ngit tag 0.3.0\ngit push origin 0.3.0\n```\n\nThe build will push the new version to ECR automatically."
  proc_app_release_step_gh_actions_publish: Github Actions will publish the image to AWS ECR.
  proc_i12e_region_tier_app_deploy_step_ecs_cluster_update: Deploy or update the existing ECS cluster with the new image.
