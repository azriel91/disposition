thing_dependencies:
  edge_dep_ir_pass1:
    kind: sequence
    things: [t_ir_diagram, t_pass1_path]
  edge_dep_pass1_contacts:
    kind: sequence
    things: [t_pass1_path, t_face_contacts]
  edge_dep_layout_contacts:
    kind: sequence
    things: [t_taffy_layout, t_face_contacts]
  edge_dep_contacts_slots:
    kind: sequence
    things: [t_face_contacts, t_slot_indices]
  edge_dep_ranks_slots:
    kind: sequence
    things: [t_node_ranks, t_slot_indices]
  edge_dep_slots_offsets:
    kind: sequence
    things: [t_slot_indices, t_offsets]
  edge_dep_labels_offsets:
    kind: sequence
    things: [t_edge_labels, t_offsets]

  edge_dep_layout_spacers:
    kind: sequence
    things: [t_taffy_layout, t_spacer_coords]
  edge_dep_spacers_gap:
    kind: sequence
    things: [t_spacer_coords, t_rank_gap_entries]
  edge_dep_ranks_gap:
    kind: sequence
    things: [t_node_ranks, t_rank_gap_entries]
  edge_dep_offsets_gap:
    kind: sequence
    things: [t_offsets, t_rank_gap_entries]
  edge_dep_gap_params:
    kind: sequence
    things: [t_rank_gap_entries, t_protrusion_params]

  edge_dep_offsets_svg:
    kind: sequence
    things: [t_offsets, t_svg_path]
  edge_dep_params_svg:
    kind: sequence
    things: [t_protrusion_params, t_svg_path]

thing_interactions:
  txn_pass1:
    kind: sequence
    things:
      - t_ir_diagram
      - t_pass1_path
  txn_collect_contacts:
    kind: sequence
    things:
      - t_pass1_path
      - t_face_contacts
  txn_slots:
    kind: sequence
    things:
      - t_face_contacts
      - t_slot_indices
  txn_offsets:
    kind: sequence
    things:
      - t_slot_indices
      - t_offsets
  txn_spacers:
    kind: sequence
    things:
      - t_taffy_layout
      - t_spacer_coords
  txn_gap_entries:
    kind: sequence
    things:
      - t_spacer_coords
      - t_rank_gap_entries
  txn_depths:
    kind: sequence
    things:
      - t_rank_gap_entries
      - t_protrusion_params
  txn_svg:
    kind: sequence
    things:
      - t_protrusion_params
      - t_svg_path

render_options:
  rank_dir: top_to_bottom
