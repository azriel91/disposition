---
# Interaction Halo With Labels, `rank_dir: right_to_left`.
#
# Mirrors `0056_interaction_halo_with_labels.yaml` under a reversed rank
# direction, so that `edge_ix_client_server__0`/`__1`'s shared cross-rank
# `edge_description_container` uses a rank container style with
# `flex_direction: ColumnReverse` -- regression coverage for
# `EdgeDescriptionBuilder::container_style_build` stripping `Reverse` down to
# `Column` so the two descriptions sharing that container render in their
# sorted (not back-to-front) order.
things:
  t_client: {}
  t_server: {}
  t_database: {}

thing_names:
  t_client: Client
  t_server: Server
  t_database: Database

thing_dependencies:
  edge_dep_client_server:
    kind: sequence
    things:
      - t_client
      - t_server

thing_interactions:
  edge_ix_client_server:
    kind: symmetric
    things:
      - t_client
      - t_server
  edge_ix_server_database:
    kind: symmetric
    things:
      - t_server
      - t_database

edge_labels:
  edge_dep_client_server__0:
    from: "c/s dep from"
    to: "c/s dep to"
  edge_ix_client_server__0:
    from: c/s from
    to: c/s to
  edge_ix_client_server__1:
    from: s/c from
    to: s/c to
  edge_ix_server_database__0:
    from: server from
    to: server to
  edge_ix_server_database__1:
    from: db from
    to: db to

edge_descs:
  edge_dep_client_server__0: "c/s dep"
  edge_ix_client_server__0: "ix 0"
  edge_ix_client_server__1: "ix 1"

theme_types_styles:
  type_interaction_edge_halo_forward:
    edge_defaults:
      style_aliases_applied: []
      shape_color: indigo
  type_interaction_edge_halo_outline_forward:
    edge_defaults:
      style_aliases_applied: []
      shape_color: indigo
  type_interaction_edge_halo_reverse:
    edge_defaults:
      style_aliases_applied: []
      shape_color: purple
  type_interaction_edge_halo_outline_reverse:
    edge_defaults:
      style_aliases_applied: []
      shape_color: purple

render_options:
  rank_dir: right_to_left
